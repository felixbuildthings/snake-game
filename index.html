<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Snake Game</title>
  <style>
    body {margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:#111;}
    canvas{background:#222;}
  </style>
</head>
<body>
<canvas id="game" width="400" height="400"></canvas>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const scale=20;
const rows=canvas.height/scale;
const cols=canvas.width/scale;
let snake=[];
let fruit={};
let dir={x:0,y:0};
let speed=200;
function setup(){
  snake=[{x:Math.floor(cols/2),y:Math.floor(rows/2)}];
  placeFruit();
  setInterval(gameLoop,speed);
}
function placeFruit(){
  fruit.x=Math.floor(Math.random()*cols);
  fruit.y=Math.floor(Math.random()*rows);
}
function gameLoop(){
  // move
  if(dir.x===0 && dir.y===0) return;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  // wall wrap
  if(head.x<0)head.x=cols-1; if(head.x>=cols)head.x=0;
  if(head.y<0)head.y=rows-1; if(head.y>=rows)head.y=0;
  // self collision
  for(let i=1;i<snake.length;i++){
    if(snake[i].x===head.x && snake[i].y===head.y){
      alert('Game Over');
      snake=[{x:Math.floor(cols/2),y:Math.floor(rows/2)}];
      dir={x:0,y:0};
      placeFruit();
      return;
    }
  }
  snake.unshift(head);
  // eat fruit
  if(head.x===fruit.x && head.y===fruit.y){
    placeFruit();
  }else{
    snake.pop();
  }
  // draw
  ctx.fillStyle='#111';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='lime';
  snake.forEach(seg=>ctx.fillRect(seg.x*scale,seg.y*scale,scale,scale));
  ctx.fillStyle='red';
  ctx.fillRect(fruit.x*scale,fruit.y*scale,scale,scale);
}
window.addEventListener('keydown',e=>{
  switch(e.key){
    case 'ArrowUp': if(dir.y===0){dir={x:0,y:-1}};break;
    case 'ArrowDown': if(dir.y===0){dir={x:0,y:1}};break;
    case 'ArrowLeft': if(dir.x===0){dir={x:-1,y:0}};break;
    case 'ArrowRight': if(dir.x===0){dir={x:1,y:0}};break;
  }
});
setup();
</script>
</body>
</html>
